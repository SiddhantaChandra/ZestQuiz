services:
  api:
    container_name: zestquiz-api
    build:
      context: .
      target: production

    restart: unless-stopped

    env_file:
      - .env

    networks:
      - backend-network

    ports:
      - "3001:3001"

    dns:
      - 8.8.8.8
      - 1.1.1.1

networks:
  backend-network:
    external: true